<header class="topbar">
  <div class="topbar-logo">
    <div class="logo-text"><a href="{{ "/" | relURL }}" style="color:inherit;text-decoration:none">c-b.io <span>RE // DFIR // CTF</span></a></div>
  </div>
  <div class="topbar-search">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="global-search" placeholder="Search cases, IOCs, techniques..." autocomplete="off">
      <span class="shortcut">/</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="icon-btn" id="notif-btn" style="position:relative" tabindex="0">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="badge">3</span>
      <div class="notif-dropdown" id="notif-dropdown">
        <div class="notif-header">Notifications <button onclick="this.closest('.notif-dropdown').classList.remove('show')">Mark all read</button></div>
        <div class="notif-item"><div class="notif-dot"></div><div class="notif-content"><div class="notif-text">New IOC match for <strong>CASE-2025-002</strong></div><div class="notif-time">2 hours ago</div></div></div>
        <div class="notif-item"><div class="notif-dot"></div><div class="notif-content"><div class="notif-text"><strong>Vanilla Tempest</strong> linked to new campaign</div><div class="notif-time">5 hours ago</div></div></div>
        <div class="notif-item"><div class="notif-dot"></div><div class="notif-content"><div class="notif-text">YARA rule triggered on VT retrohunt</div><div class="notif-time">1 day ago</div></div></div>
      </div>
    </div>
    <div class="user-pill">
      <div class="user-avatar">H</div>
      <span class="user-name">{{ .Site.Params.author }}</span>
      <span class="status-dot"></span>
    </div>
  </div>
</header>
